{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
  <h1>Register</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('register') }}">
    <input type="hidden" name="csrf" value="{{ csrf_token() }}">
    <label for="username">Username (1–32 letters/numbers)</label>
    <input type="text" id="username" name="username" autocomplete="username" maxlength="32" required>
    <label for="password">Password (at least 8 characters)</label>
    <input type="password" id="password" name="password" autocomplete="new-password" maxlength="256" required>
    <button type="submit">Create account</button>
  </form>
  <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
{% endblock %}
