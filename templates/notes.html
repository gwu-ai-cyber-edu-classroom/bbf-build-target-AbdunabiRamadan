{% extends "base.html" %}
{% block title %}My notes{% endblock %}
{% block content %}
  <h1>My notes</h1>
  <p><a href="{{ url_for('new_note') }}">+ New note</a></p>
  {% if notes %}
    <ul class="notes">
      {% for note in notes %}
        <li><a href="{{ url_for('view_note', note_id=note['id']) }}">{{ note["title"] }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>You have no notes yet.</p>
  {% endif %}
{% endblock %}
