{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <h1>Log in</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="csrf" value="{{ csrf_token() }}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" maxlength="32" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" maxlength="256" required>
    <button type="submit">Log in</button>
  </form>
  <p>No account? <a href="{{ url_for('register') }}">Register</a>.</p>
{% endblock %}
