<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Secure Notes{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    nav { display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: .5rem; margin-bottom: 1rem; }
    nav .spacer { flex: 1; }
    .error { color: #b00020; background: #fde; padding: .5rem .75rem; border-radius: 4px; }
    label { display: block; margin: .75rem 0 .25rem; font-weight: 600; }
    input[type=text], input[type=password], textarea { width: 100%; padding: .5rem; box-sizing: border-box; }
    textarea { min-height: 8rem; }
    button { padding: .5rem 1rem; margin-top: .75rem; cursor: pointer; }
    .note-body { white-space: pre-wrap; word-break: break-word; background: #f6f6f6; padding: .75rem; border-radius: 4px; }
    ul.notes { list-style: none; padding: 0; }
    ul.notes li { padding: .4rem 0; border-bottom: 1px solid #eee; }
    .inline { display: inline; }
  </style>
</head>
<body>
  <nav>
    <strong>Secure Notes</strong>
    <span class="spacer"></span>
    {% if user %}
      <span>Signed in as {{ user["username"] }}</span>
      <a href="{{ url_for('notes') }}">My notes</a>
      <form class="inline" method="post" action="{{ url_for('logout') }}">
        <input type="hidden" name="csrf" value="{{ csrf_token() }}">
        <button type="submit">Log out</button>
      </form>
    {% else %}
      <a href="{{ url_for('login') }}">Log in</a>
      <a href="{{ url_for('register') }}">Register</a>
    {% endif %}
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
